<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
        <div>
            <label for="name">이름</label>
            <input type="name" id="name" placeholder="이름을 입력하세요.">
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password"  id="password" placeholder="비밀번호를 입력하세요.">
        </div>
        <div>
            <label for="email">이메일</label>
            <input type="email"  id="email" placeholder="이메일을 입력하세요.">
        </div>
        <div>
            <label for="text">나이</label>
            <input type="text"  id="text" placeholder="나이를 입력하세요.">
        </div>

            <label for="text">성별</label>
        <br>
        
            
                <label for="male">남성</label>
                <input type="radio" name="delivery" id="male" value="male">
                <label for="female">여성</label>
                <input type="radio" name="delivery" id="female" value="female">
        <br>        
            
            <label for="text">생년월일</label>
            <label for="date"></label>
                    <input type="date" id="date">
        <br>
        <label for="text">파일</label>
        <input type="file">
        <br>
        <label for="text">버튼</label>
        <br>
        <button type="submit">일반 버튼</button>
        <br>
        <label for="text">국적</label>
        <select name="country" id="country">
            <option value="Korea">한국</option>
            <option value="China">중국</option>
            <option value="Japan">일본</option>
            <option value="기타">기타</option>
            </select>

            <br>
            <label for="text">취미 선택:</label>
            <label for="movie">영화</label>
                <input type="checkbox" id="movie" value="movie">
            <label for="music">음악</label>
                <input type="checkbox" id="music" value="music">
            <label for="sleep">취침</label>
                <input type="checkbox" id="sleep" value="sleep">
        
        
        </fieldset>
    </form>
</body>
</html>
